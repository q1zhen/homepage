Research and Publications:
  "ShUD: the First Shanghainese Universal Dependency Treebank":
    begin: January 2025
    description: "[**Read Paper »**](https://aclanthology.org/2025.udw-1.20.pdf) <br/> Treebank included in the [Universal Dependencies project](https://universaldependencies.org/#:~:text=Shanghainese); Accepted paper in [UD Workshop 2025](https://universaldependencies.org/udw25/) (part of [SyntaxFest 2025](https://syntaxfest.github.io/syntaxfest25/), an ACL-affiliated conference, in Ljubljana, 26&ndash;29 August 2025)"
    url: https://aclanthology.org/2025.udw-1.20/
    abstract: This paper introduces [**ShUD**](https://github.com/UniversalDependencies/UD_Shanghainese-ShUD), the first Universal Dependencies (UD) treebank for Shanghainese, a Wu Chinese variant spoken by approximately 14 million people but severely under-resourced in NLP. The treebank is built through a scalable annotation pipeline that exploits grammatical parallels between Shanghainese and Mandarin. Our pipeline also provides a practical strategy for bootstrapping resources for other Chinese dialects. We documented syntactic phenomena unique to Shanghainese within the UD framework and fine-tuned a dependency parser using our annotated treebank, contributing a foundation to both NLP tool development and cross-linguistic syntactic research.
    Treebank URL: https://github.com/UniversalDependencies/UD_Shanghainese-ShUD
  "Enhancing Fluid Dynamics Simulations: Integrating Neural Operators into Visual Models":
    time: July 2025
    description: Published in [2025 IEEE 7th International Conference on Artificial Intelligence, Computer Science, and Information Processing (AICSIP)](https://ieeexplore.ieee.org/xpl/conhome/11427187/proceeding), in Hangzhou, 25&ndash;26 July 2025
    url: https://doi.org/10.1109/AICSIP65423.2025.11427279
    abstract: Fluid dynamics simulations, a cornerstone for lots of scientific fields, often require solving partial differential equations (PDEs), e.g. Navier-Strokes equations. Traditional methods such as computational fluid dynamics (CFD) are typically computationally intensive and have limitations on real-time simulations and extreme boundary conditions. This research discovers the potential of U-Net-like deep learning architecture, as a visual model, to simulate fluid motions and integrates neural operators, particularly Fourier Neural Operator (FNO) and Adaptive Fourier Neural Operator (AFNO), into its architecture to enhance and specialize its capability in capturing features in fluid motions and provides an alternative approach. Experiments are done on shallow water equations (single property) and Navier-Strokes equations (multiple properties). The modified architecture showcases a significant improvement compared with the baseline model, especially in single-property simulations and shows promise in multi-property scenarios, with improvements up to 80% in the error.

